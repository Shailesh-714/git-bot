name: Release

on:
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build package
        run: npm run build

      - name: Read version from package.json
        id: version
        run: echo "version=$(jq -r .version package.json)" >> "$GITHUB_OUTPUT"

      - name: Create git tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "v${{ steps.version.outputs.version }}" || true
          git push origin "v${{ steps.version.outputs.version }}" || true

      - name: Build release archives
        run: |
          sudo apt-get update && sudo apt-get install -y zip

          mkdir -p release/git-bot/dist release/git-bot/bin
          cp bundle/git-bot.cjs release/git-bot/dist/
          cp package.json release/git-bot/

          for platform in linux-x64 linux-arm64 darwin-x64 darwin-arm64; do
            cp scripts/git-bot release/git-bot/bin/git-bot
            chmod +x release/git-bot/bin/git-bot
            tar -czf "git-bot-${platform}.tar.gz" -C release git-bot
          done

          cp scripts/git-bot.cmd release/git-bot/bin/git-bot.cmd
          (cd release && zip -rq ../git-bot-windows-x64.zip git-bot)

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: |
            git-bot-linux-x64.tar.gz
            git-bot-linux-arm64.tar.gz
            git-bot-darwin-x64.tar.gz
            git-bot-darwin-arm64.tar.gz
            git-bot-windows-x64.zip
